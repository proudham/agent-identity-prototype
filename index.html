<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Identity — Drift</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'HarveySans';
      src: url('./HarveySansDiatypeVariable.woff2') format('woff2');
      font-weight: 200 1000;
      font-display: swap;
    }
    @font-face {
      font-family: 'HarveySerif';
      src: url('./HarveySerif-Regular.woff2') format('woff2');
      font-weight: 400;
      font-display: swap;
    }
    :root { --bg: #0F0E0D; --fg: #FAFAF9; --dim: rgba(250,250,249,0.35); --dimmer: rgba(250,250,249,0.12); --faint: rgba(250,250,249,0.06); }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--fg); font-family: 'HarveySans', 'Inter', sans-serif; }

    .hero { position: relative; width: 100%; height: 100vh; overflow: hidden; }
    .hero.inverted { background: #FAFAF9; }
    .hero.inverted .hero-content { color: #0F0E0D; }
    .hero.inverted .hero-nav { color: #0F0E0D; }

    /* Nav bar */
    .hero-nav {
      position: absolute;
      top: 0; left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 28px 36px;
      z-index: 3;
      pointer-events: auto;
    }
    .hero-nav-logo {
      font-family: 'HarveySans', 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 300;
      letter-spacing: 0.02em;
    }
    .hero-nav-harvey {
      font-family: 'HarveySerif', Georgia, serif;
      font-weight: 400;
    }
    .hero-nav-logo strong {
      font-weight: 650;
    }
    .hero-nav-link {
      font-family: 'HarveySans', 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 400;
      color: inherit;
      text-decoration: none;
      opacity: 0.7;
      transition: opacity 0.15s;
    }
    .hero-nav-link:hover { opacity: 1; }

    /* Hero content — centered headline */
    .hero-content {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 2;
      text-align: center;
      pointer-events: none;
    }

    .hero-h1 {
      font-family: 'HarveySerif', Georgia, serif;
      font-weight: 400;
      font-size: clamp(40px, 6.2vw, 88px);
      line-height: 1.18;
      letter-spacing: -0.015em;
      white-space: nowrap;
    }

    /* Second section for scroll testing */
    .section-next {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: var(--dimmer);
    }

    /* Control panel */
    .panel { position: fixed; top: 0; right: 0; width: 280px; height: 100vh; padding: 20px 18px; overflow-y: auto; border-left: 1px solid var(--faint); display: flex; flex-direction: column; gap: 4px; background: var(--bg); z-index: 10; transform: translateX(0); transition: transform 0.3s ease; }
    .panel.collapsed { transform: translateX(100%); }
    .panel-toggle { position: fixed; top: 16px; right: 16px; z-index: 11; width: 32px; height: 32px; border: 1px solid var(--dimmer); border-radius: 6px; background: var(--bg); color: var(--dim); font-family: inherit; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
    .panel-toggle:hover { background: var(--faint); color: var(--fg); }
    .panel:not(.collapsed) ~ .panel-toggle { right: 296px; }
    .panel-title { font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--dim); padding: 12px 0 8px; }
    .panel-title:first-child { padding-top: 0; }
    .ctrl { display: flex; flex-direction: column; gap: 3px; padding: 5px 0; }
    .ctrl-head { display: flex; justify-content: space-between; align-items: center; }
    .ctrl-name { font-size: 11px; color: var(--dim); }
    .ctrl-val { font-size: 11px; color: var(--dimmer); font-variant-numeric: tabular-nums; }
    .ctrl input[type="range"] { width: 100%; height: 2px; -webkit-appearance: none; appearance: none; background: var(--dimmer); border-radius: 1px; outline: none; margin-top: 4px; }
    .ctrl input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: var(--fg); opacity: 0.35; cursor: pointer; }
    .toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 5px 0; cursor: pointer; user-select: none; }
    .toggle-row .ctrl-name { cursor: pointer; }
    .toggle-track { width: 32px; height: 16px; border-radius: 8px; background: var(--dimmer); position: relative; transition: background 0.2s; }
    .toggle-track.on { background: var(--dim); }
    .toggle-thumb { width: 12px; height: 12px; border-radius: 50%; background: var(--fg); opacity: 0.5; position: absolute; top: 2px; left: 2px; transition: left 0.2s; }
    .toggle-track.on .toggle-thumb { left: 18px; }
    .divider { height: 1px; background: var(--faint); margin: 8px 0; }
  </style>
</head>
<body>
  <section class="hero" id="hero">
    <nav class="hero-nav">
      <span class="hero-nav-logo"><span class="hero-nav-harvey">Harvey</span> <strong>Agents</strong></span>
      <a href="#" class="hero-nav-link">Home</a>
    </nav>
    <div class="hero-content">
      <h1 class="hero-h1">Delegate the Work.<br>Own the Judgement.</h1>
    </div>
  </section>


  <div class="panel">
    <span class="panel-title">Agents</span>
    <div class="ctrl">
      <div class="ctrl-head"><span class="ctrl-name">Radius</span><span class="ctrl-val" id="radiusVal">140</span></div>
      <input type="range" id="radius" min="40" max="240" value="140">
    </div>
    <div class="ctrl">
      <div class="ctrl-head"><span class="ctrl-name">Speed</span><span class="ctrl-val" id="speedVal">18</span></div>
      <input type="range" id="speed" min="2" max="60" value="18">
    </div>
    <div class="ctrl">
      <div class="ctrl-head"><span class="ctrl-name">Font size</span><span class="ctrl-val" id="fontSizeVal">12</span></div>
      <input type="range" id="fontSize" min="4" max="24" value="12">
    </div>

    <div class="divider"></div>
    <span class="panel-title">Field</span>
    <div class="ctrl">
      <div class="ctrl-head"><span class="ctrl-name">Threshold</span><span class="ctrl-val" id="thresholdVal">1.0</span></div>
      <input type="range" id="threshold" min="0.3" max="2.0" step="0.05" value="1.0">
    </div>
    <div class="ctrl">
      <div class="ctrl-head"><span class="ctrl-name">Wave speed</span><span class="ctrl-val" id="waveSpeedVal">36</span></div>
      <input type="range" id="waveSpeed" min="1" max="100" value="36">
    </div>
    <div class="ctrl">
      <div class="ctrl-head"><span class="ctrl-name">Clearance</span><span class="ctrl-val" id="clearanceVal">300</span></div>
      <input type="range" id="clearance" min="0" max="500" value="300">
    </div>

    <div class="divider"></div>
    <span class="panel-title">Display</span>
    <div class="toggle-row" id="invertRow">
      <span class="ctrl-name">Invert</span>
      <div class="toggle-track" id="invertTrack"><div class="toggle-thumb"></div></div>
    </div>
    <div class="toggle-row" id="pauseRow">
      <span class="ctrl-name">Pause</span>
      <div class="toggle-track" id="pauseTrack"><div class="toggle-thumb"></div></div>
    </div>
  </div>
  <button class="panel-toggle" id="panelToggle">&#9881;</button>

  <script type="module">
    // ══════════════════════════════════════
    // State
    // ══════════════════════════════════════
    const P = {
      inverted: false,
      paused: false,
      waveSpeed: 36,
      minW: 200,
      maxW: 1000,
      clearanceRadius: 300,
    };

    const DRIFT = {
      radius: 140,
      speed: 18,
      fieldThreshold: 1.0,
      fontSize: 12,
      letterSpacing: 1,
      edgePad: 60,
      mouseRadius: 80,
      mouseFieldStrength: 0.8,
      entranceDuration: 4.0,
    };

    // ══════════════════════════════════════
    // Utilities
    // ══════════════════════════════════════
    function hashName(name) {
      let h = 0;
      for (let i = 0; i < name.length; i++) h = ((h << 5) - h + name.charCodeAt(i)) | 0;
      return (h & 0x7fffffff) / 0x7fffffff;
    }

    function seededRandom(seed, offset) {
      const s = Math.sin(seed * 10000 + offset * 127.1) * 43758.5453;
      return s - Math.floor(s);
    }

    function buildLayers(name) {
      const seed = hashName(name);
      const count = 3 + Math.floor(seededRandom(seed, 99) * 3);
      const result = [];
      for (let i = 0; i < count; i++) {
        result.push({
          angle: seededRandom(seed, i * 3 + 0) * Math.PI * 2,
          freqMul: 0.6 + seededRandom(seed, i * 3 + 1) * 1.2,
          phase: seededRandom(seed, i * 3 + 2) * Math.PI * 2,
          amp: 1.0 / (1 + i * 0.5),
        });
      }
      return result;
    }

    // ══════════════════════════════════════
    // Brightness: layered sines
    // ══════════════════════════════════════
    const BASE_FREQ = 14;

    function getBrightness(nx, ny, phase, layerSet) {
      let total = 0, totalAmp = 0;
      for (let i = 0; i < layerSet.length; i++) {
        const l = layerSet[i];
        const dx = Math.cos(l.angle), dy = Math.sin(l.angle);
        const spatial = (nx * dx + ny * dy) * BASE_FREQ * l.freqMul;
        total += Math.sin(spatial + l.phase + phase) * l.amp;
        totalAmp += l.amp;
      }
      return (total / totalAmp + 1) / 2;
    }

    // ══════════════════════════════════════
    // Agent data
    // ══════════════════════════════════════
    const FONT = "'HarveySans', 'Inter', sans-serif";

    const presetData = [
      { label: 'Ingest data room', chars: 'Ingest data room' },
      { label: 'Extract key terms', chars: 'Extract key terms' },
      { label: 'Flag regulatory triggers', chars: 'Flag regulatory triggers' },
      { label: 'Cross-ref precedent', chars: 'Cross-reference precedent' },
      { label: 'Draft red flag report', chars: 'Draft red flag report' },
    ];

    const AGENTS = presetData.map((p, idx) => {
      const nc = p.chars.replace(/\s/g, '').split('');
      const seed = hashName(p.chars);
      return {
        id: idx,
        label: p.label,
        chars: p.chars,
        nameChars: nc,
        layers: buildLayers(p.chars),
        seed,
        depth: 0.6 + seededRandom(seed, 80) * 0.4, // 0.6 – 1.0
      };
    });


    // ══════════════════════════════════════
    // DriftMode
    // ══════════════════════════════════════
    class DriftMode {
      constructor(heroEl) {
        this.hero = heroEl;
        this.canvas = document.createElement('canvas');
        this.canvas.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;';
        this.hero.insertBefore(this.canvas, this.hero.firstChild);
        this.ctx = this.canvas.getContext('2d');
        this.agents = [];
        this.cellW = 0;
        this.cellH = 0;
        this.dpr = window.devicePixelRatio || 1;

        // Mouse state
        this.mouseX = 0;
        this.mouseY = 0;
        this.mouseActive = false;
        this.mouseCurrentRadius = 0;

        // Entrance animation
        this.entranceStart = null;
        this.entranceProgress = 0;

        // Scroll fade
        this.scrollOpacity = 1;

        this._resize();
        this._initAgents();

        // Debounced resize
        let resizeTimer;
        this._onResize = () => {
          clearTimeout(resizeTimer);
          resizeTimer = setTimeout(() => { this._resize(); this._measureCells(); }, 100);
        };
        window.addEventListener('resize', this._onResize);

        // Mouse events
        this.canvas.addEventListener('mousemove', e => {
          const rect = this.canvas.getBoundingClientRect();
          this.mouseX = e.clientX - rect.left;
          this.mouseY = e.clientY - rect.top;
          this.mouseActive = true;
        });
        this.canvas.addEventListener('mouseleave', () => { this.mouseActive = false; });

        // Touch events
        this.canvas.addEventListener('touchmove', e => {
          const rect = this.canvas.getBoundingClientRect();
          const t = e.touches[0];
          this.mouseX = t.clientX - rect.left;
          this.mouseY = t.clientY - rect.top;
          this.mouseActive = true;
        }, { passive: true });
        this.canvas.addEventListener('touchend', () => { this.mouseActive = false; });

        // Scroll fade
        this._onScroll = () => {
          const heroH = this.hero.offsetHeight;
          const scrollY = window.scrollY;
          this.scrollOpacity = Math.max(0, 1 - scrollY / (heroH * 0.6));
        };
        window.addEventListener('scroll', this._onScroll, { passive: true });

        // Visibility API
        this._onVisibility = () => {
          if (document.hidden) P.paused = true;
          // Don't auto-unpause — let the loop handle timestamp reset
        };
        document.addEventListener('visibilitychange', this._onVisibility);
      }

      _resize() {
        const rect = this.hero.getBoundingClientRect();
        this.w = rect.width;
        this.h = rect.height;
        this.canvas.width = rect.width * this.dpr;
        this.canvas.height = rect.height * this.dpr;
        this.ctx.setTransform(this.dpr, 0, 0, this.dpr, 0, 0);
      }

      _measureCells() {
        const ctx = this.ctx;
        const fs = DRIFT.fontSize;
        ctx.font = `500 ${fs}px ${FONT}`;
        let globalMaxCharW = 0;
        for (const agent of AGENTS) {
          for (const ch of agent.nameChars) {
            const cw = ctx.measureText(ch).width;
            if (cw > globalMaxCharW) globalMaxCharW = cw;
          }
        }
        this.cellW = globalMaxCharW + DRIFT.letterSpacing + 1;
        this.cellH = fs * 1.3;
      }

      _initAgents() {
        const w = this.w;
        const h = this.h;

        this._measureCells();

        // Spread agents across full viewport width
        this.agents = AGENTS.map((a, i) => {
          const seed = a.seed;
          const depth = a.depth;

          // Distribute across viewport with seeded variation
          const xSpread = w * 0.8;
          const xStart = w * 0.1;
          const baseX = xStart + (i / (AGENTS.length - 1)) * xSpread;
          const baseY = h * (0.3 + seededRandom(seed, 50) * 0.4);

          // Soft cluster around center for entrance (not all at the same point)
          const originAngle = seededRandom(seed, 70) * Math.PI * 2;
          const originDist = 30 + seededRandom(seed, 71) * 60;
          const originX = w / 2 + Math.cos(originAngle) * originDist;
          const originY = h / 2 + Math.sin(originAngle) * originDist;
          // Stagger: each agent starts its entrance at a slightly different time
          const entranceDelay = i * 0.15;

          const vAngle = seededRandom(seed, 60) * Math.PI * 2;
          const spd = DRIFT.speed * depth * (0.7 + seededRandom(seed, 61) * 0.6);

          return {
            ...a,
            x: baseX,
            y: baseY,
            targetX: baseX,
            targetY: baseY,
            originX,
            originY,
            entranceDelay,
            vx: Math.cos(vAngle) * spd,
            vy: Math.sin(vAngle) * spd,
          };
        });
      }

      updatePhysics(dt) {
        const w = this.w;
        const h = this.h;
        const pad = DRIFT.edgePad;
        const baseR = DRIFT.radius;

        // Smooth mouse radius in/out
        const targetMouseR = this.mouseActive ? DRIFT.mouseRadius : 0;
        this.mouseCurrentRadius += (targetMouseR - this.mouseCurrentRadius) * Math.min(1, dt * 6);

        for (const a of this.agents) {
          const r = baseR * a.depth;
          const wobbleTime = performance.now() / 1000;
          const wobbleX = Math.sin(wobbleTime * 0.3 + a.seed * 100) * 0.3;
          const wobbleY = Math.cos(wobbleTime * 0.25 + a.seed * 200) * 0.3;

          // Speed scales with depth
          const spdFactor = DRIFT.speed * a.depth * (0.7 + seededRandom(a.seed, 61) * 0.6);
          const vxDir = a.vx === 0 ? 1 : Math.sign(a.vx);
          const vyDir = a.vy === 0 ? 1 : Math.sign(a.vy);
          a.vx += (vxDir * spdFactor - a.vx) * 0.02;
          a.vy += (vyDir * spdFactor - a.vy) * 0.02;

          a.x += (a.vx + wobbleX) * dt;
          a.y += (a.vy + wobbleY) * dt;

          if (a.x - r < pad) { a.x = pad + r; a.vx = Math.abs(a.vx); }
          if (a.x + r > w - pad) { a.x = w - pad - r; a.vx = -Math.abs(a.vx); }
          if (a.y - r < pad) { a.y = pad + r; a.vy = Math.abs(a.vy); }
          if (a.y + r > h - pad) { a.y = h - pad - r; a.vy = -Math.abs(a.vy); }
        }
      }

      render(phase, entranceProg) {
        const ctx = this.ctx;
        const cellW = this.cellW;
        const cellH = this.cellH;
        const threshold = DRIFT.fieldThreshold;
        const weightRange = P.maxW - P.minW;
        const fs = DRIFT.fontSize;
        const baseR = DRIFT.radius;
        const fgColor = P.inverted ? '#0F0E0D' : '#FAFAF9';
        const cx = this.w / 2;
        const cy = this.h / 2;
        const clearR = P.clearanceRadius;

        // Apply scroll fade
        ctx.clearRect(0, 0, this.w, this.h);
        if (this.scrollOpacity <= 0) return;

        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        const mouseR = this.mouseCurrentRadius;

        // Build active agents list
        const allAgents = [];
        for (const a of this.agents) {
          const r = baseR * a.depth;
          let ax, ay;
          // Per-agent staggered entrance
          const agentProg = Math.max(0, Math.min(1, (entranceProg * DRIFT.entranceDuration - a.entranceDelay) / (DRIFT.entranceDuration - a.entranceDelay)));
          if (agentProg < 1) {
            const ease = 1 - Math.pow(1 - agentProg, 4);
            ax = a.originX + (a.x - a.originX) * ease;
            ay = a.originY + (a.y - a.originY) * ease;
          } else {
            ax = a.x;
            ay = a.y;
          }
          allAgents.push({ ...a, ax, ay, r, rSq: r * r });
        }

        if (allAgents.length === 0) return;

        // Bounding box union
        const bulge = 1.5;
        let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
        for (const a of allAgents) {
          const br = a.r * bulge;
          if (a.ax - br < minX) minX = a.ax - br;
          if (a.ay - br < minY) minY = a.ay - br;
          if (a.ax + br > maxX) maxX = a.ax + br;
          if (a.ay + br > maxY) maxY = a.ay + br;
        }

        const startCol = Math.floor(minX / cellW);
        const endCol = Math.ceil(maxX / cellW);
        const startRow = Math.floor(minY / cellH);
        const endRow = Math.ceil(maxY / cellH);

        const draws = [];

        for (let row = startRow; row <= endRow; row++) {
          const py = row * cellH + cellH / 2;
          for (let col = startCol; col <= endCol; col++) {
            const px = col * cellW + cellW / 2;

            // Clearance zone — suppress field near center
            const cdx = px - cx, cdy = py - cy;
            const cDist = Math.sqrt(cdx * cdx + cdy * cdy);
            if (clearR > 0 && cDist < clearR) continue;
            // Soft fade just outside clearance
            let clearanceFade = 1;
            const clearFadeZone = 60;
            if (clearR > 0 && cDist < clearR + clearFadeZone) {
              clearanceFade = (cDist - clearR) / clearFadeZone;
              clearanceFade = clearanceFade * clearanceFade; // ease-in
            }

            let totalField = 0;
            let dominantAgent = null;
            let dominantField = 0;
            let secondField = 0;
            let secondAgent = null;

            for (let i = 0; i < allAgents.length; i++) {
              const a = allAgents[i];
              const dx = px - a.ax, dy = py - a.ay;
              const distSq = dx * dx + dy * dy;
              if (distSq < 1) continue;
              const f = a.rSq / distSq;
              totalField += f;
              if (f > dominantField) {
                secondField = dominantField;
                secondAgent = dominantAgent;
                dominantField = f;
                dominantAgent = a;
              } else if (f > secondField) {
                secondField = f;
                secondAgent = a;
              }
            }

            // Mouse negative field — dimples the blob surface
            if (mouseR > 2) {
              const mdx = px - this.mouseX, mdy = py - this.mouseY;
              const mDistSq = mdx * mdx + mdy * mdy;
              if (mDistSq > 1) {
                totalField -= DRIFT.mouseFieldStrength * (mouseR * mouseR) / mDistSq;
              }
            }

            if (totalField < threshold || !dominantAgent) continue;

            // Edge falloff — smooth opacity ramp
            const fieldExcess = totalField - threshold;
            const falloffZone = threshold * 0.5;
            let scale = 1;
            let edgeOpacity = 1;
            if (fieldExcess < falloffZone) {
              const t = fieldExcess / falloffZone;
              scale = 0.3 + t * t * 0.7;
              edgeOpacity = t; // smooth fade at boundary
            }

            const charSize = Math.round(fs * scale);
            if (charSize < 2) continue;

            const nx = (px - dominantAgent.ax) / (dominantAgent.r * 2) + 0.5;
            const ny = (py - dominantAgent.ay) / (dominantAgent.r * 2) + 0.5;

            const rowOffset = Math.floor(row * dominantAgent.nameChars.length * 0.618033);
            const ci = ((col >= 0 ? col : -col) + rowOffset) % dominantAgent.nameChars.length;
            const ch = dominantAgent.nameChars[ci];

            let n;
            if (secondAgent && secondField / dominantField > 0.3) {
              const blend = (secondField / dominantField - 0.3) / 0.7;
              const nx2 = (px - secondAgent.ax) / (secondAgent.r * 2) + 0.5;
              const ny2 = (py - secondAgent.ay) / (secondAgent.r * 2) + 0.5;
              const b1 = getBrightness(nx, ny, phase, dominantAgent.layers);
              const b2 = getBrightness(nx2, ny2, phase, secondAgent.layers);
              n = b1 * (1 - blend) + b2 * blend;
            } else {
              n = getBrightness(nx, ny, phase, dominantAgent.layers);
            }

            let weight, opacity;
            if (P.inverted) {
              const inv = 1 - n;
              weight = Math.min(P.maxW, Math.max(P.minW, Math.round((P.minW + inv * weightRange) / 100) * 100));
              opacity = 0.2 + inv * 0.8;
            } else {
              weight = Math.min(P.maxW, Math.max(P.minW, Math.round((P.minW + n * weightRange) / 100) * 100));
              opacity = 0.15 + n * 0.85;
            }

            // Apply depth dimming, edge fade, clearance fade, scroll fade
            opacity *= dominantAgent.depth * edgeOpacity * clearanceFade * this.scrollOpacity;

            if (opacity < 0.02) continue;

            draws.push({ px, py, ch, charSize, weight, opacity });
          }
        }

        draws.sort((a, b) => (a.weight * 100 + a.charSize) - (b.weight * 100 + b.charSize));

        let lastFont = '';
        for (let i = 0; i < draws.length; i++) {
          const d = draws[i];
          const fontStr = `${d.weight} ${d.charSize}px ${FONT}`;
          if (fontStr !== lastFont) {
            ctx.font = fontStr;
            lastFont = fontStr;
          }
          ctx.globalAlpha = d.opacity;
          ctx.fillStyle = fgColor;
          ctx.fillText(d.ch, d.px, d.py);
        }

        ctx.globalAlpha = 1;
      }
    }

    // ══════════════════════════════════════
    // Init
    // ══════════════════════════════════════
    const hero = document.getElementById('hero');
    const drift = new DriftMode(hero);

    // ══════════════════════════════════════
    // Panel toggle
    // ══════════════════════════════════════
    const panelEl = document.querySelector('.panel');
    document.getElementById('panelToggle').addEventListener('click', () => {
      panelEl.classList.toggle('collapsed');
    });

    // ══════════════════════════════════════
    // Controls
    // ══════════════════════════════════════
    function bindDrift(id, key, fmt) {
      const el = document.getElementById(id);
      const val = document.getElementById(id + 'Val');
      el.addEventListener('input', () => {
        DRIFT[key] = +el.value;
        if (val) val.textContent = fmt ? fmt(+el.value) : el.value;
        drift._measureCells();
      });
    }

    bindDrift('radius', 'radius');
    bindDrift('speed', 'speed');
    bindDrift('fontSize', 'fontSize');
    bindDrift('threshold', 'fieldThreshold', v => v.toFixed(2));

    const waveEl = document.getElementById('waveSpeed');
    const waveVal = document.getElementById('waveSpeedVal');
    waveEl.addEventListener('input', () => {
      P.waveSpeed = +waveEl.value;
      waveVal.textContent = waveEl.value;
    });

    const clearEl = document.getElementById('clearance');
    const clearVal = document.getElementById('clearanceVal');
    clearEl.addEventListener('input', () => {
      P.clearanceRadius = +clearEl.value;
      clearVal.textContent = clearEl.value;
    });

    document.getElementById('invertRow').addEventListener('click', () => {
      P.inverted = !P.inverted;
      hero.classList.toggle('inverted', P.inverted);
      document.getElementById('invertTrack').classList.toggle('on', P.inverted);
    });

    document.getElementById('pauseRow').addEventListener('click', () => {
      P.paused = !P.paused;
      document.getElementById('pauseTrack').classList.toggle('on', P.paused);
    });

    // ══════════════════════════════════════
    // Animation loop
    // ══════════════════════════════════════
    let t0 = null;
    let lastTimestamp = null;
    let wasHidden = false;

    function loop(timestamp) {
      // Handle returning from hidden tab
      if (wasHidden) {
        lastTimestamp = timestamp;
        wasHidden = false;
        P.paused = false;
        document.getElementById('pauseTrack').classList.remove('on');
      }

      if (t0 === null) t0 = timestamp;
      if (lastTimestamp === null) lastTimestamp = timestamp;
      const dt = Math.min((timestamp - lastTimestamp) / 1000, 0.05);
      lastTimestamp = timestamp;

      if (!P.paused) {
        // Entrance animation
        const elapsed = (timestamp - t0) / 1000;
        const entranceProg = Math.min(1, elapsed / DRIFT.entranceDuration);

        const timeMs = timestamp - t0;
        const phase = (timeMs / 1000) * (P.waveSpeed / 10);
        drift.updatePhysics(dt);
        drift.render(phase, entranceProg);
      }
      requestAnimationFrame(loop);
    }

    // Visibility API — mark hidden so we can gracefully resume
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) wasHidden = true;
    });

    Promise.race([
      document.fonts.ready,
      new Promise(r => setTimeout(r, 2000)),
    ]).then(() => requestAnimationFrame(loop));
  </script>
</body>
</html>
