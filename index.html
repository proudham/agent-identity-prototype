<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Identity — Workbench</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'HarveySans';
      src: url('./HarveySansDiatypeVariable.woff2') format('woff2');
      font-weight: 200 1000;
      font-display: swap;
    }
    :root { --bg: #0F0E0D; --fg: #FAFAF9; --dim: rgba(250,250,249,0.35); --dimmer: rgba(250,250,249,0.12); --faint: rgba(250,250,249,0.06); }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--fg); font-family: 'HarveySans', 'Inter', sans-serif; display: flex; height: 100vh; overflow: hidden; }

    /* Invert only affects the stage, not the panel */
    .stage.inverted { background: #FAFAF9; }
    .stage.inverted .viz-char { color: #0F0E0D; }
    .stage.inverted .viz-label { color: rgba(15,14,13,0.35); }
    .stage.inverted .stage-label { color: rgba(15,14,13,0.35); }

    .stage { flex: 1; display: flex; align-items: center; justify-content: center; gap: 32px; position: relative; }
    .stage-label { font-size: 12px; color: var(--dim); }
    .viz-col { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .viz-label { font-size: 10px; color: var(--dim); font-variant-numeric: tabular-nums; }

    /* DOM-based visualization container */
    .viz {
      position: relative;
      overflow: visible;
    }
    .viz-char {
      position: absolute;
      font-family: 'HarveySans', 'Inter', sans-serif;
      text-align: center;
      line-height: 1;
      pointer-events: none;
      will-change: font-weight, opacity;
    }

    .panel { width: 280px; flex-shrink: 0; padding: 20px 18px; overflow-y: auto; border-left: 1px solid var(--faint); display: flex; flex-direction: column; gap: 4px; }
    .panel-title { font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--dim); padding: 12px 0 8px; }
    .panel-title:first-child { padding-top: 0; }
    .ctrl { display: flex; flex-direction: column; gap: 3px; padding: 5px 0; }
    .ctrl-head { display: flex; justify-content: space-between; align-items: center; }
    .ctrl-name { font-size: 11px; color: var(--dim); }
    .ctrl-val { font-size: 11px; color: var(--dimmer); font-variant-numeric: tabular-nums; }
    .ctrl input[type="range"] { width: 100%; height: 2px; -webkit-appearance: none; appearance: none; background: var(--dimmer); border-radius: 1px; outline: none; margin-top: 4px; }
    .ctrl input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: var(--fg); opacity: 0.35; cursor: pointer; }
    .toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 5px 0; cursor: pointer; user-select: none; }
    .toggle-row .ctrl-name { cursor: pointer; }
    .toggle-track { width: 32px; height: 16px; border-radius: 8px; background: var(--dimmer); position: relative; transition: background 0.2s; }
    .toggle-track.on { background: var(--dim); }
    .toggle-thumb { width: 12px; height: 12px; border-radius: 50%; background: var(--fg); opacity: 0.5; position: absolute; top: 2px; left: 2px; transition: left 0.2s; }
    .toggle-track.on .toggle-thumb { left: 18px; }
    .text-input { width: 100%; padding: 7px 10px; border: 1px solid var(--dimmer); border-radius: 6px; background: transparent; color: var(--fg); font-family: inherit; font-size: 11px; outline: none; margin-top: 4px; }
    .text-input:focus { border-color: var(--dim); }
    .presets { display: flex; gap: 4px; padding: 4px 0; flex-wrap: wrap; }
    .preset-btn { padding: 6px 10px; border: 1px solid var(--dimmer); border-radius: 6px; background: transparent; color: var(--dim); font-family: inherit; font-size: 10px; cursor: pointer; transition: all 0.15s; }
    .preset-btn:hover { background: var(--faint); color: var(--fg); }
    .divider { height: 1px; background: var(--faint); margin: 8px 0; }
  </style>
</head>
<body>
  <div class="stage" id="stage">
    <span class="stage-label" id="stageLabel" style="position:absolute; bottom:24px; left:50%; transform:translateX(-50%);">Cross-ref precedent</span>
  </div>

  <div class="panel">
    <span class="panel-title">Presets</span>
    <div class="presets" id="presets"></div>

    <div class="divider"></div>
    <span class="panel-title">Display</span>
    <div class="toggle-row" id="invertRow">
      <span class="ctrl-name">Invert</span>
      <div class="toggle-track" id="invertTrack"><div class="toggle-thumb"></div></div>
    </div>
    <div class="toggle-row" id="pauseRow">
      <span class="ctrl-name">Pause</span>
      <div class="toggle-track" id="pauseTrack"><div class="toggle-thumb"></div></div>
    </div>
  </div>

  <script type="module">
    import { prepare, walkLineRanges } from 'https://esm.sh/@chenglou/pretext@0.0.3'

    // ══════════════════════════════════════
    // State
    // ══════════════════════════════════════
    const P = {
      speed: 36,
      fontSize: 10, minW: 200, maxW: 1000, letterSpacing: 1,
      chars: 'Cross-reference precedent',
      borderRadius: 20,
      inverted: false, paused: false,
    };

    const SIZES = [256, 128, 64, 32];
    const BASE_SIZE = 256;

    // Derived from name (set by applyName)
    let layers = [];
    let nameChars = [];

    // Pretext-based character width cache
    const charWidthCache = new Map();
    function measureCharWidth(ch, fontStr) {
      const key = `${ch}|${fontStr}`;
      if (charWidthCache.has(key)) return charWidthCache.get(key);
      const prepared = prepare(ch, fontStr);
      let width = 0;
      walkLineRanges(prepared, 9999, (line) => { width = line.width; });
      charWidthCache.set(key, width);
      return width;
    }

    // ══════════════════════════════════════
    // Utilities
    // ══════════════════════════════════════
    function hashName(name) {
      let h = 0;
      for (let i = 0; i < name.length; i++) h = ((h << 5) - h + name.charCodeAt(i)) | 0;
      return (h & 0x7fffffff) / 0x7fffffff;
    }

    function seededRandom(seed, offset) {
      const s = Math.sin(seed * 10000 + offset * 127.1) * 43758.5453;
      return s - Math.floor(s);
    }

    // ══════════════════════════════════════
    // Build sine wave layers from name
    // ══════════════════════════════════════
    function buildLayers(name) {
      const seed = hashName(name);
      const count = 3 + Math.floor(seededRandom(seed, 99) * 3);
      const result = [];
      for (let i = 0; i < count; i++) {
        result.push({
          angle: seededRandom(seed, i * 3 + 0) * Math.PI * 2,
          freqMul: 0.6 + seededRandom(seed, i * 3 + 1) * 1.2,
          phase: seededRandom(seed, i * 3 + 2) * Math.PI * 2,
          amp: 1.0 / (1 + i * 0.5),
        });
      }
      return result;
    }

    // ══════════════════════════════════════
    // Brightness: layered sines
    // ══════════════════════════════════════
    // BASE_FREQ now operates on normalized 0-1 coordinates so waves scale with container
    const BASE_FREQ = 14;

    function getBrightness(nx, ny, phase) {
      let total = 0, totalAmp = 0;
      for (let i = 0; i < layers.length; i++) {
        const l = layers[i];
        const dx = Math.cos(l.angle), dy = Math.sin(l.angle);
        const spatial = (nx * dx + ny * dy) * BASE_FREQ * l.freqMul;
        total += Math.sin(spatial + l.phase + phase) * l.amp;
        totalAmp += l.amp;
      }
      return (total / totalAmp + 1) / 2;
    }

    // ══════════════════════════════════════
    // VizInstance — one visualization at a given size
    // ══════════════════════════════════════
    const FONT = "'HarveySans', 'Inter', sans-serif";

    class VizInstance {
      constructor(size, parentEl) {
        this.size = size;
        this.spans = [];
        this.gridCells = [];
        this.needsRebuild = true;
        this.lastLayoutKey = '';

        // Create DOM
        const col = document.createElement('div');
        col.className = 'viz-col';

        this.el = document.createElement('div');
        this.el.className = 'viz';
        col.appendChild(this.el);

        const label = document.createElement('span');
        label.className = 'viz-label';
        label.textContent = size + 'px';
        col.appendChild(label);

        parentEl.appendChild(col);
      }

      get scaledFontSize() {
        // Use a lookup for small sizes to ensure characters remain legible
        if (this.size <= 32) return 3;
        if (this.size <= 64) return 4;
        if (this.size <= 128) return 6;
        return P.fontSize;
      }

      get scaledLetterSpacing() {
        if (this.size <= 64) return 0;
        if (this.size <= 128) return P.letterSpacing * 0.5;
        return P.letterSpacing;
      }

      rebuildGrid() {
        const size = this.size;
        const fs = this.scaledFontSize;
        const ls = this.scaledLetterSpacing;

        // Update container
        this.el.style.width = size + 'px';
        this.el.style.height = size + 'px';
        // No border — circular text shape defines the form

        // Measure widest character via Pretext
        const measureFont = `${fs}px ${FONT}`;
        let maxCharW = 0;
        for (let i = 0; i < nameChars.length; i++) {
          const w = measureCharWidth(nameChars[i], measureFont);
          if (w > maxCharW) maxCharW = w;
        }
        const cellW = maxCharW + ls + 1;
        const cellH = fs * 1.3;
        const cols = Math.floor(size / cellW);
        const rows = Math.floor(size / cellH);

        // Circle-based layout with edge falloff
        const cx = size / 2, cy = size / 2;
        const circleR = size * 0.46;
        const falloff = size * 0.12;
        const MIN_SCALE = 0.3;

        const newCells = [];

        // Center the grid on the circle center
        const gridW = cols * cellW;
        const gridH = rows * cellH;
        const offsetX = (size - gridW) / 2 + cellW / 2;
        const offsetY = (size - gridH) / 2 + cellH / 2;

        for (let row = 0; row < rows; row++) {
          const y = offsetY + row * cellH;
          for (let col = 0; col < cols; col++) {
            const x = offsetX + col * cellW;

            const dx = x - cx, dy = y - cy;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist > circleR) continue;

            // Edge falloff — scale down near the circle boundary
            const distFromEdge = circleR - dist;
            let scale = 1;
            if (distFromEdge < falloff) {
              const t = distFromEdge / falloff;
              scale = MIN_SCALE + t * t * (1 - MIN_SCALE);
            }

            const charSize = Math.round(fs * scale);
            if (charSize < 2) continue;

            const rowOffset = Math.floor(row * nameChars.length * 0.618033);
            const ci = (col + rowOffset) % nameChars.length;

            const nx = x / size;
            const ny = y / size;

            newCells.push({ x, y, nx, ny, charSize, ci, cellW });
          }
        }

        // Grow or shrink span pool
        while (this.spans.length < newCells.length) {
          const span = document.createElement('span');
          span.className = 'viz-char';
          this.el.appendChild(span);
          this.spans.push(span);
        }
        for (let i = newCells.length; i < this.spans.length; i++) {
          this.spans[i].style.display = 'none';
        }

        // Position spans
        for (let i = 0; i < newCells.length; i++) {
          const cell = newCells[i];
          const span = this.spans[i];
          span.style.display = '';
          span.style.left = (cell.x - cell.cellW / 2) + 'px';
          span.style.top = (cell.y - cell.charSize / 2) + 'px';
          span.style.width = cell.cellW + 'px';
          span.style.fontSize = cell.charSize + 'px';
          span.textContent = nameChars[cell.ci];
          cell.span = span;
        }

        this.gridCells = newCells;
        this.needsRebuild = false;
        this.lastLayoutKey = this.layoutKey;
      }

      get layoutKey() {
        return `${this.size}_${P.fontSize}_${P.letterSpacing}_${P.borderRadius}_${P.chars}`;
      }

      render(phase) {
        if (nameChars.length === 0) return;

        if (this.needsRebuild || this.layoutKey !== this.lastLayoutKey) {
          this.rebuildGrid();
        }

        const weightRange = P.maxW - P.minW;

        for (let i = 0; i < this.gridCells.length; i++) {
          const cell = this.gridCells[i];
          const n = getBrightness(cell.nx, cell.ny, phase);

          let weight, opacity;
          if (P.inverted) {
            // Inverted: flip brightness so wave reads as shadow/depth
            const inv = 1 - n;
            weight = Math.min(P.maxW, Math.max(P.minW, Math.round((P.minW + inv * weightRange) / 50) * 50));
            opacity = 0.2 + inv * 0.8; // linear, floor at 0.2 so quiet chars stay visible
          } else {
            weight = Math.min(P.maxW, Math.max(P.minW, Math.round((P.minW + n * weightRange) / 50) * 50));
            opacity = 0.15 + n * 0.85;
          }

          cell.span.style.fontWeight = weight;
          cell.span.style.opacity = opacity;
        }
      }

      flagRebuild() {
        this.needsRebuild = true;
      }
    }

    // ══════════════════════════════════════
    // Create instances
    // ══════════════════════════════════════
    const stage = document.getElementById('stage');
    const instances = SIZES.map(size => new VizInstance(size, stage));

    // ══════════════════════════════════════
    // Apply a name — derives all animation params
    // ══════════════════════════════════════
    function applyName(name, label) {
      P.chars = name;
      nameChars = name.replace(/\s/g, '').split('');
      layers = buildLayers(name);
      const charEl = document.getElementById('charInput');
      if (charEl) charEl.value = name;
      document.getElementById('stageLabel').textContent = label || name;
      instances.forEach(inst => inst.flagRebuild());
    }

    // ══════════════════════════════════════
    // Controls
    // ══════════════════════════════════════
    function bind(id, key, fmt) {
      const el = document.getElementById(id);
      const val = document.getElementById(id + 'Val');
      el.addEventListener('input', () => {
        P[key] = +el.value;
        if (val) val.textContent = fmt ? fmt(el.value) : el.value;
        instances.forEach(inst => inst.flagRebuild());
      });
    }

    // Typography and container controls removed — using fixed defaults

    // charInput removed — characters set by presets only

    document.getElementById('invertRow').addEventListener('click', () => {
      P.inverted = !P.inverted;
      document.getElementById('stage').classList.toggle('inverted', P.inverted);
      document.getElementById('invertTrack').classList.toggle('on', P.inverted);
    });

    document.getElementById('pauseRow').addEventListener('click', () => {
      P.paused = !P.paused;
      document.getElementById('pauseTrack').classList.toggle('on', P.paused);
    });

    // ══════════════════════════════════════
    // Presets
    // ══════════════════════════════════════
    const presetData = [
      { label: 'Ingest data room', chars: 'Ingest data room' },
      { label: 'Extract key terms', chars: 'Extract key terms' },
      { label: 'Flag regulatory triggers', chars: 'Flag regulatory triggers' },
      { label: 'Cross-ref precedent', chars: 'Cross-reference precedent' },
      { label: 'Draft red flag report', chars: 'Draft red flag report' },
      { label: 'Diligence Agent (LH)', chars: 'Ingest data room Extract key terms Flag regulatory triggers Cross-reference precedent Draft red flag report' },
    ];

    const presetsEl = document.getElementById('presets');
    presetData.forEach(p => {
      const btn = document.createElement('button');
      btn.className = 'preset-btn';
      btn.textContent = p.label;
      btn.addEventListener('click', () => applyName(p.chars, p.label));
      presetsEl.appendChild(btn);
    });

    // ══════════════════════════════════════
    // Init + Animation loop
    // ══════════════════════════════════════
    applyName(P.chars);

    let t0 = null;
    function loop(timestamp) {
      if (t0 === null) t0 = timestamp;
      if (!P.paused) {
        const timeMs = timestamp - t0;
        const phase = (timeMs / 1000) * (P.speed / 10);
        for (let i = 0; i < instances.length; i++) {
          instances[i].render(phase);
        }
      }
      requestAnimationFrame(loop);
    }

    Promise.race([
      document.fonts.ready,
      new Promise(r => setTimeout(r, 2000)),
    ]).then(() => requestAnimationFrame(loop));
  </script>
</body>
</html>
